# ─────────────────────────────────────────────────────────────────────────────
# Local development infrastructure
#
# Services & exposed ports (host → container)
#   PostgreSQL 17          → localhost:5432
#   Keycloak (26.5.4+)     → http://localhost:8180          (direct, for Spring Boot)
#                            https://localhost/auth          (via nginx, for browser / Postman)
#   WireMock 3.13.0        → http://localhost:8280          (direct, no nginx route)
#   smtp4dev  SMTP         → localhost:2525
#   smtp4dev  Web UI       → http://localhost:9080          (direct, no nginx route)
#   nginx  HTTPS hub       → https://localhost:443          (TLS self-signed, cert generated at build time)
#
# nginx routes
#   /auth  →  Keycloak:8080  (HTTP + HTTPS)
#
# Startup
#   First time (or after nginx/Dockerfile changes):
#     cd infra && docker compose up -d --build
#   Every subsequent time:
#     cd infra && docker compose up -d
#
# Reset (destroys volumes + rebuilds):
#   docker compose down -v && docker compose up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL 17 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:17
    container_name: infra_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD:-postgres}
    volumes:
      - project_postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks:
      - infra_net

  # ── Keycloak (version controlled by KEYCLOAK_VERSION env, default 26.5.4) ──
  auth:
    image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION:-26.5.4}
    container_name: infra_keycloak
    # start-dev: relaxed production checks; --import-realm on first run only
    command: start-dev --import-realm
    environment:
      # Database backend
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_DB_NAME:-keycloak_db}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak_user}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_pass}
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_RELATIVE_PATH: /auth
      # Admin console credentials
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_LOG_LEVEL: INFO
      JAVA_OPTS: "-Xms256m -Xmx1g -XX:MetaspaceSize=96M -XX:MaxMetaspaceSize=256m"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    ports:
      - "8180:8080"
    depends_on:
      - postgres
    networks:
      - infra_net

  # ── WireMock 3.13.0 — mock external HTTP services (http://localhost:8280) ──
  wiremock:
    image: wiremock/wiremock:3.13.0
    container_name: infra_wiremock
    command: --verbose --global-response-templating
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings:ro
      - ./wiremock/__files:/home/wiremock/__files:ro
    ports:
      - "8280:8080"
    networks:
      - infra_net

  # ── smtp4dev — mock SMTP server (smtp:2525, web UI:9080) ──────────────────
  mail:
    image: rnwood/smtp4dev
    container_name: infra-mail
    ports:
      - "2525:25"
      - "9080:80"
    networks:
      - infra_net

  # ── nginx — HTTPS termination (https://localhost:443, self-signed cert auto-generated at build) ──
  reverse-proxy:
    depends_on:
      - auth
    container_name: infra-reverseproxy
    build:
      context: ./reverse-proxy
      dockerfile: Dockerfile
    ports:
      - "443:443"
    command: /bin/sh -c "envsubst < /etc/nginx/conf.d/default.conf.template > /etc/nginx/conf.d/default.conf && exec nginx -g 'daemon off;'"
    networks:
      - infra_net

# ─────────────────────────────────────────────────────────────────────────────
volumes:
  project_postgres_data:

networks:
  infra_net:
    driver: bridge

